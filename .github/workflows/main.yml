name: Build NetSpec iOS
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install Dependencies
        run: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Customize App
        run: |
          # 1. Настройки
          NEW_NAME="NetSpec"
          NEW_BUNDLE_ID="com.artem.netspec"
          
          # 2. Название и ID (Поиск Info.plist)
          PLIST_PATH=$(find . -name "Info.plist" | grep -v "Tests" | head -n 1)
          if [ -n "$PLIST_PATH" ]; then
            echo "Customizing $PLIST_PATH"
            plutil -replace CFBundleDisplayName -string "$NEW_NAME" "$PLIST_PATH"
            plutil -replace CFBundleName -string "$NEW_NAME" "$PLIST_PATH"
            plutil -replace CFBundleIdentifier -string "$NEW_BUNDLE_ID" "$PLIST_PATH"
          fi

          # 3. Иконка (Замена в Assets)
          if [ -f "$PWD/AppIcon.png" ]; then
            ASSETS_PATH=$(find . -name "Assets.xcassets" | head -n 1)
            APPICON_SET_PATH="$ASSETS_PATH/AppIcon.appiconset"
            mkdir -p "$APPICON_SET_PATH"
            rm -f "$APPICON_SET_PATH"/*.png
            cp "$PWD/AppIcon.png" "$APPICON_SET_PATH/icon.png"
            printf '{"images":[{"idiom":"universal","platform":"ios","size":"1024x1024","filename":"icon.png"}],"info":{"version":1,"author":"xcode"}}' > "$APPICON_SET_PATH/Contents.json"
            echo "Icon updated to NetSpec style."
          fi

      - name: Build App
        run: |
          # В этом репозитории основная схема обычно называется 'xNetFuture' или 'Xray'
          # Мы попробуем собрать конкретный таргет
          
          mkdir -p $PWD/build_output
          
          xcodebuild-safe() {
            xcodebuild -workspace *.xcworkspace -scheme "$1" \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath $PWD/derived_data \
              CONFIGURATION_BUILD_DIR=$PWD/build_output \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              AD_HOC_CODE_SIGNING_ALLOWED=YES \
              clean build || echo "Failed to build $1, trying next..."
          }

          # Пробуем две самые вероятные схемы по очереди
          xcodebuild-safe "xNetFuture"
          xcodebuild-safe "Xray"

      - name: Prepare IPA
        run: |
          mkdir -p build/Payload
          
          echo "--- ГЛУБОКИЙ ПОИСК ФАЙЛОВ ---"
          # Ищем все файлы .app и выводим их размер
          find . -name "*.app" -exec du -sh {} +
          
          # Пытаемся найти самый тяжелый .app (это и есть наше приложение)
          APP_PATH=$(find . -name "*.app" -type d -exec test -e "{}/Info.plist" \; -print | head -n 1)
          
          echo "FOUND APP PATH: $APP_PATH"
          
          if [ -z "$APP_PATH" ] || [ $(du -s "$APP_PATH" | cut -f1) -lt 100 ]; then
             echo "ERROR: Найдена пустая оболочка. Ищем бинарник внутри derived_data..."
             APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d -exec test -e "{}/Info.plist" \; -print | head -n 1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "КРИТИЧЕСКАЯ ОШИБКА: Xcode не создал исполняемый файл."
            exit 1
          fi

          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r NetSpec.ipa Payload
          echo "NetSpec.ipa created!"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetSpec-IPA
          path: build/NetSpec.ipa
