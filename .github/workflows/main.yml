name: Build NetSpec iOS
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install Dependencies
        run: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Customize App
        run: |
          # 1. Настройки
          NEW_NAME="NetSpec"
          NEW_BUNDLE_ID="com.artem.netspec"
          
          # 2. Название и ID (Поиск Info.plist)
          PLIST_PATH=$(find . -name "Info.plist" | grep -v "Tests" | head -n 1)
          if [ -n "$PLIST_PATH" ]; then
            echo "Customizing $PLIST_PATH"
            plutil -replace CFBundleDisplayName -string "$NEW_NAME" "$PLIST_PATH"
            plutil -replace CFBundleName -string "$NEW_NAME" "$PLIST_PATH"
            plutil -replace CFBundleIdentifier -string "$NEW_BUNDLE_ID" "$PLIST_PATH"
          fi

          # 3. Иконка (Замена в Assets)
          if [ -f "$PWD/AppIcon.png" ]; then
            ASSETS_PATH=$(find . -name "Assets.xcassets" | head -n 1)
            APPICON_SET_PATH="$ASSETS_PATH/AppIcon.appiconset"
            mkdir -p "$APPICON_SET_PATH"
            rm -f "$APPICON_SET_PATH"/*.png
            cp "$PWD/AppIcon.png" "$APPICON_SET_PATH/icon.png"
            printf '{"images":[{"idiom":"universal","platform":"ios","size":"1024x1024","filename":"icon.png"}],"info":{"version":1,"author":"xcode"}}' > "$APPICON_SET_PATH/Contents.json"
            echo "Icon updated to NetSpec style."
          fi

      - name: Build App
        run: |
          # 1. Авто-поиск схемы
          SCHEME=$(xcodebuild -list -workspace *.xcworkspace | grep -A 10 "Schemes:" | tail -n +2 | head -n 1 | xargs)
          echo "Building scheme: $SCHEME"
          
          # 2. Сборка с принудительным выводом в конкретную папку
          xcodebuild -workspace *.xcworkspace -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath $PWD/derived_data \
            OBJROOT=$PWD/build.obj \
            SYMROOT=$PWD/build.sym \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_IDENTITY=""

      - name: Prepare IPA
        run: |
          mkdir -p build/Payload
          
          # Ищем файл .app по всему проекту, исключая папки симуляторов
          APP_PATH=$(find . -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          # Если не нашли в Release-iphoneos, ищем любой .app (на крайний случай)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          fi
          
          echo "FINAL APP PATH: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file still not found! Listing files for debug:"
            find . -maxdepth 4 -name "*.app"
            exit 1
          fi
          
          # Копируем найденное приложение в Payload
          cp -r "$APP_PATH" build/Payload/
          
          # Создаем IPA
          cd build && zip -r NetSpec.ipa Payload
          echo "IPA created successfully at build/NetSpec.ipa"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetSpec-IPA
          path: build/NetSpec.ipa
